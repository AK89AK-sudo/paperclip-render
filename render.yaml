services:
  - type: web
    name: paperclip
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-db
          property: connectionString
      - key: PAPERCLIP_PUBLIC_URL
        value: https://paperclip-l1cb.onrender.com
      - key: PAPERCLIP_AGENT_JWT_SECRET
        sync: false
      - key: PAPERCLIP_SECRETS_MASTER_KEY
        sync: false
      - key: PAPERCLIP_SECRETS_PROVIDER
        value: env
      - key: PAPERCLIP_SECRETS_STRICT_MODE
        value: "false"
      - key: NODE_NO_WARNINGS
        value: "1"
      - key: PORT
        value: "3100"

databases:
  - name: paperclip-db
    plan: free
    databaseName: paperclip
    user: paperclip
